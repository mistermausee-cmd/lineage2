# ---------------------------------------------------------------------------
# NPC Stat Multipliers
# ---------------------------------------------------------------------------
# SOLO BALANCE (mistermausee-cmd/lineage2):
# Raid bosses are weakened so a single well-geared player can farm them.
# Grand bosses (epics) have their OWN multiplier category (GrandBoss*) so they
# can be tuned independently of ordinary raid bosses. Requires the custom core
# (NpcTemplate splits "GrandBoss" from "RaidBoss"). If GrandBoss* keys are
# omitted, values fall back to the matching Raidboss* value.
# Regular monsters, guards and defenders are kept retail (1.0) to preserve
# world difficulty.

# Enable/Disable NPC stat multipliers.
EnableNpcStatMultipliers = True

# Monsters (kept retail for world difficulty)
MonsterHP = 1.0
MonsterMP = 1.0
MonsterPAtk = 1.0
MonsterMAtk = 1.0
MonsterPDef = 1.0
MonsterMDef = 1.0
MonsterAggroRange = 1.0
MonsterClanHelpRange = 1.0

# Raidbosses (weakened for solo play - ~35% HP, ~55% damage, ~60% defence)
RaidbossHP = 0.35
RaidbossMP = 1.0
RaidbossPAtk = 0.55
RaidbossMAtk = 0.55
RaidbossPDef = 0.6
RaidbossMDef = 0.6
RaidbossAggroRange = 1.0
RaidbossClanHelpRange = 1.0

# Grand bosses / epics (weakened HARDER than raid bosses for solo play).
# Epics have enormous base stats (e.g. Antharas ~689M HP, ~3M P.Atk), so they
# get a deeper cut: ~15% HP, ~30% attack, ~50% defence. Tune here freely - no
# core rebuild needed to change these numbers, only a server restart.
GrandBossHP = 0.15
GrandBossMP = 1.0
GrandBossPAtk = 0.30
GrandBossMAtk = 0.30
GrandBossPDef = 0.50
GrandBossMDef = 0.50
GrandBossAggroRange = 1.0
GrandBossClanHelpRange = 1.0

# Guards
GuardHP = 1.0
GuardMP = 1.0
GuardPAtk = 1.0
GuardMAtk = 1.0
GuardPDef = 1.0
GuardMDef = 1.0
GuardAggroRange = 1.0
GuardClanHelpRange = 1.0

# Defenders
DefenderHP = 1.0
DefenderMP = 1.0
DefenderPAtk = 1.0
DefenderMAtk = 1.0
DefenderPDef = 1.0
DefenderMDef = 1.0
DefenderAggroRange = 1.0
DefenderClanHelpRange = 1.0
