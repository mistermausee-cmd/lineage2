# =================================================================
#                             Geodata
# =================================================================

# Pathfinding options:
# 0 = Disabled
# 1 = Enabled using path node files.
# 2 = Enabled using geodata cells at runtime (recommended).
# Default: 2
# ВАЖНО: значение 2 требует наличия файлов геодаты в ./data/geodata/ (*.l2j).
# Геодата в git НЕ хранится (см. .gitignore) — её нужно один раз скачать
# скриптом:  bash server/game/download_geodata.sh
# Источник: L2J Mobius geodata (репозиторий bartty/mobius-geo), 215 регионов,
# формат .l2j — проверено на совместимость с этим GameServer.jar.
# Если геодата ещё НЕ скачана — временно поставь 0, иначе будут ЛАГИ и ошибки
# в логах (сервер пытается искать пути без данных). После загрузки верни 2.
PathFinding = 2

# Geodata file directory.
GeoDataPath = ./data/geodata/

# Pathnode file directory.
# Default: pathnode
PathnodePath = ./data/pathnode/

# Geodata editor save directory.
# Can set to ./data/geodata/ to replace existing files on save.
GeoEditPath = ./saves/

# Pathfinding array buffers configuration.
PathFindBuffers = 100x6;128x6;192x6;256x4;320x4;384x4;500x2

# Weight for nodes without obstacles far from walls.
LowWeight = 0.5

# Weight for nodes near walls.
MediumWeight = 2

# Weight for nodes with obstacles.
HighWeight = 3

# Angle paths will be more "smart", but in cost of higher CPU utilization.
AdvancedDiagonalStrategy = False

# Avoid pathing to nodes that are obstructed at any direction.
AvoidObstructedPathNodes = True

# Weight for diagonal movement. Used only with AdvancedDiagonalStrategy = True
# Default: LowWeight * sqrt(2) 
DiagonalWeight = 0.707

# Maximum number of LOS postfilter passes, 0 will disable postfilter.
# Default: 3
MaxPostfilterPasses = 3
