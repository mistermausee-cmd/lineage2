<html><title>Данные аккаунта: %account%</title><body>
<center>
<table width=270><tr>
<td width=45><button value="Главная" action="bypass admin_admin" width=45 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
<td width=180><center>Аккаунт: %account%</center></td>
<td width=45><button value="Назад" action="bypass admin_character_info %player%" width=45 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td></tr>
</table><br>
<table width=270>
<tr>
<td>Параметры:</td>
<td><edit var="qbox" width=100 height=15></td>
<td><button value="Помощь" action="bypass admin_html help/accountinfo.htm" width=40 height=20 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
<td><button value="Назад" action="bypass -h admin_character_info %player%" width=40 height=20 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
</tr>
</table>
<br><br>
<table width=270>
<tr>
<td><button value="Бан аккаунта" action="bypass -h admin_ban_acc %account%" width=90 height=20 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
<td><button value="Сброс бана" action="bypass -h admin_unban_acc %account%" width=90 height=20 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
<td><button value="Свой уровень" action="bypass -h admin_account_level %account% $qbox" width=90 height=20 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
</tr>
</table>
<br><br>
</center>
Аккаунт: <font color="LEVEL">%account%</font><br>
Другие персонажи на аккаунте %player%:<br>
%characters%
</body></html>
