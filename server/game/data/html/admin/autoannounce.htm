<html><body>
<table width=270><tr>
<td width=45><button value="Главная" action="bypass admin_admin" width=45 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
<td width=180><center>Меню автообъявлений</center></td>
<td width=45><button value="Назад" action="bypass admin_admin7" width=45 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
</tr></table><br><br>
<center>Новое автообъявление:</center><br>
<table width=270><tr>
<td>Начальная задержка (сек):</td>
<td><edit var="autoann_initial" width=50></td>
</tr><tr>
<td>Задержка анонса (сек):</td>
<td><edit var="autoann_delay" width=50></td>
</tr><tr>
<td>Повтор (-1 — бесконечно):</td>
<td><edit var="autoann_repeat" width=50></td>
</tr><tr>
<td>Критический:</td>
<td><combobox var="autoann_critical" list="false;true" width=50></td>
</tr><tr>
<td>Текст:</td></tr></table>
<multiedit var="autoann_memo" width=250 height=50><br>
<center><table><tr>
<td><button value="Добавить" action="bypass -h admin_add_autoann $autoann_initial $autoann_delay $autoann_repeat $autoann_critical $autoann_memo" width=70 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
<td><button value="Перезагрузка" action="bypass -h admin_reload_autoann" width=70 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
</tr></table></center>
<br>
%announces%
</body></html>
