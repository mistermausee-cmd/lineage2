<html><title>Главное меню админа</title><body>
<center>
<table width=270 border=0 bgcolor="444444">
<tr>
<td><button value="Главная" action="bypass admin_admin" width=65 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
<td><button value="Персонаж" action="bypass admin_admin6" width=65 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
<td><button value="Игра" action="bypass admin_admin2" width=65 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
<td><button value="ГМ" action="bypass admin_admin7" width=65 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
</tr>
</table>
<br>
<font name="hs11" color="LEVEL">%templateName% (%templateId%)</font>
<br>

<font name="hs10" color="LEVEL">Инфо:</font><br1>
<table border=0 cellpadding=0 cellspacing=0 bgcolor="363636">
<tr>
<td align=center fixwidth="250">Активные миры:</font></td>
<td align=center fixwidth="250"><font color="LEVEL">%activeWorlds%</font></td>
</tr>

<tr>
<td align=center fixwidth="250">Длительность:</font></td>
<td align=center fixwidth="250"><font color="LEVEL">%duration%</font></td>
</tr>

<tr>
<td align=center fixwidth="250">Время удаления (пусто):</font></td>
<td align=center fixwidth="250"><font color="LEVEL">%emptyDuration%</font></td>
</tr>

<tr>
<td align=center fixwidth="250">Время выброса:</font></td>
<td align=center fixwidth="250"><font color="LEVEL">%ejectDuration%</font></td>
</tr>

<tr>
<td align=center fixwidth="250">Убрать баффы:</font></td>
<td align=center fixwidth="250"><font color="LEVEL">%removeBuff%</font></td>
</tr>
</table>

<br><br>
<font name="hs10" color="LEVEL">Создать инстанс из шаблона:</font><br1>

<combobox width=120 height=17 var=ebox list=Alone;Party;CommandChannel><br>
<button value="Создать инстанс!" action="bypass -h admin_instancecreate %templateId% $ebox" width=140 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF">

<br><br>
<font name="hs10" color="LEVEL">Активные инстансы:</font><br1>

%instanceList%

<button value="Назад" action="bypass -h admin_instancelist" width=200 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"><br1>
</center>
</body></html>
