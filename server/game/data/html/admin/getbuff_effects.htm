<html>
	<head>
		<title>Эффекты %targetName%</title>
	</head>
	<body>
		<table width="100%">
			<tr>
				<td width=45>
					<button value="Главная" action="bypass admin_admin" width=45 height=21 back="L2UI_ct1.button_df" fore="L2UI_ct1.button_df">
				</td>
				<td width=180>
					<center><font color="LEVEL">Эффекты %targetName%</font></center>
				</td>
				<td width=45>
					<button value="Назад" action="bypass admin_getbuffs" width=45 height=21 back="L2UI_ct1.button_df" fore="L2UI_ct1.button_df">
				</td>
				<td width=15></td>
			</tr>
		</table>
		<br>
		<table width="100%">
			<tr>
				<td width=80>Эффект</td>
				<td width=25>Время</td>
			</tr>
		</table>
		<table><tr><td><img src="L2UI.SquareGray" height=1 width=295></td></tr></table>
			%buffs%
		<br>%pages%<br>
		<center>
		<button value="Заблок. эффекты" action="bypass admin_viewblockedeffects %targetObjId%" width=160 height=21 back="L2UI_ct1.button_df" fore="L2UI_ct1.button_df"><br>
		<button value="Убрать все" action="bypass admin_stopallbuffs %targetObjId%" width=160 height=21 back="L2UI_ct1.button_df" fore="L2UI_ct1.button_df"><br>
		<br>
		Всего эффектов: %effectSize%
		</center>
	</body>
</html>
