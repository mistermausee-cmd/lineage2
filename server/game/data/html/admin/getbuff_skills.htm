<html>
	<head>
		<title>Эффекты %targetName%</title>
	</head>
	<body>
		<table width="100%">
			<tr>
				<td width=45>
					<button value="Главная" action="bypass admin_admin" width=45 height=21 back="L2UI_ct1.button_df" fore="L2UI_ct1.button_df">
				</td>
				<td width=180>
					<center><font color="LEVEL">Эффекты %targetName%</font></center>
				</td>
				<td width=45>
					<button value="Назад" action="bypass admin_current_player" width=45 height=21 back="L2UI_ct1.button_df" fore="L2UI_ct1.button_df">
				</td>
				<td width=15></td>
			</tr>
		</table>
		<table width="100%">
		<tr><td>
			%buffs%
		</td></tr>
		</table>
		<br><br>%pages%<br>
		<center>
		<button value="%buffsText%" action="bypass admin_getbuffs%passives% %targetName%" width=160 height=21 back="L2UI_ct1.button_df" fore="L2UI_ct1.button_df"><br>
		<button value="Убрать все" action="bypass admin_stopallbuffs %targetObjId%" width=160 height=21 back="L2UI_ct1.button_df" fore="L2UI_ct1.button_df"><br>
		<br>
		Всего умений: %skillSize%
		</center>
	</body>
</html>
