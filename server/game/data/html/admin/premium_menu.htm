<html><title>Управление премиум-сервисом</title><body>
<center>
<table width=270>
<tr>
<td width=45><button value="Главная" action="bypass admin_admin" width=45 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
<td width=180><center>Управление премиум-сервисом</center></td>
<td width=45><button value="Назад" action="bypass admin_admin6" width=45 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
</tr>
</table>
<br>
<font color="LEVEL">Введите имя аккаунта</font><br>
<edit var="acc_name" width=200>
<br>
<br><button value="Добавить премиум на 1 месяц" action="bypass -h admin_premium_add1 $acc_name" width=200 height=30 back="L2UI_CT1.OlympiadWnd_DF_Reward_Down" fore="L2UI_CT1.OlympiadWnd_DF_Reward">
<button value="Добавить премиум на 2 месяца" action="bypass -h admin_premium_add2 $acc_name" width=200 height=30 back="L2UI_CT1.OlympiadWnd_DF_Reward_Down" fore="L2UI_CT1.OlympiadWnd_DF_Reward">
<button value="Добавить премиум на 3 месяца" action="bypass -h admin_premium_add3 $acc_name" width=200 height=30 back="L2UI_CT1.OlympiadWnd_DF_Reward_Down" fore="L2UI_CT1.OlympiadWnd_DF_Reward">
<br>
<button value="Инфо о премиуме" action="bypass -h admin_premium_info $acc_name" width=200 height=30 back="L2UI_CT1.HtmlWnd_DF_Area_Down" fore="L2UI_CT1.HtmlWnd_DF_Area">
<button value="Убрать премиум" action="bypass -h admin_premium_remove $acc_name" width=200 height=30  back="L2UI_CT1.HtmlWnd_DF_Reset_Down" fore="L2UI_CT1.HtmlWnd_DF_Reset">
<br>
<font color="FF0000">Игроки могут использовать команду .premium,<br1>
чтобы посмотреть статус своего аккаунта.</font>
</center>
</body></html>
