<html><body>
<table width=260><tr>
<td width=40><button value="Главная" action="bypass admin_admin" width=40 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
<td width=180><center>Редактор умений игрока/клана</center></td>
<td width=40><button value="Назад" action="bypass admin_character_info %name%" width=40 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
</tr></table>
<br><br>
<center>Редактирование <font color="LEVEL">%name%</font>
<br>
<table width=270>
	<tr>
		<td width=50>Класс:</td>
		<td width=160><font color="LEVEL">%class%</font></td>
		<td width=20>Ур:</td>
		<td width=40><font color="LEVEL">%level%</font></td>
	</tr>
</table>
<br>
============ Игрок ============
<br>
<table width=270>
<tr>
	<td><button value="Добавить умения" action="bypass admin_skill_list" width=130 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
	<td><button value="Забрать умения" action="bypass -h admin_get_skills" width=130 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
</tr>
<tr>
	<td><button value="Удалить умения" action="bypass admin_remove_skills 0" width=130 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
	<td><button value="Сброс отката умений" action="bypass admin_removereuse" width=130 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
</tr>
<tr>
	<td><button value="Выдать все умения" action="bypass -h admin_give_all_skills" width=130 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
	<td><button value="Вернуть умения" action="bypass -h admin_reset_skills" width=130 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
</tr>
<tr>
	<td><button value="Выдать все умения FS" action="bypass -h admin_give_all_skills_fs" width=130 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
	<td><button value="Убрать все умения" action="bypass -h admin_remove_all_skills" width=130 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
</tr>
</table>
<br>
============ Клан ============
<br>
<table width=270>
<tr>
	<td><button value="Выдать умения клана" action="bypass -h admin_give_clan_skills" width=130 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
	<td><button value="Все умения клана" action="bypass -h admin_give_all_clan_skills" width=130 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
</tr>
</table></center></body></html>
