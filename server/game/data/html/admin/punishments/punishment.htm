<html><title>Панель информации о наказаниях</title><body>
<center>
<table width=270>
<tr>
<td width=45><button value="Главная" action="bypass admin_admin" width=45 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
<td width=180><center>Панель наказаний</center></td>
<td width=45><button value="Назад" action="bypass admin_admin7" width=45 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
</tr>
</table>
<br>
<table width=280 bgcolor="666666" cellspacing="0" cellpadding="6">
	<tr>
		<td>Тип цели:</td>
		<td><combobox width=120 height=12 var="affectType" list="%affects%"></td>
	</tr>
	<tr>
		<td>Ключ:</td>
		<td><edit var="key" width="130" height="12"></td>
	</tr>
	<tr>
		<td></td>
		<td><a action="bypass admin_punishment info $key $affectType">Проверить</a></td>
	</tr>
</table>
<br>
<table width=280 bgcolor="666666" cellspacing="0" cellpadding="6">
	<tr>
		<td>Тип наказания:</td>
		<td><combobox width=120 height=12 var="punishmentType" list="%punishments%"></td>
	</tr>
	<tr>
		<td>Время:</td>
		<td><edit var="expiration" width="130" height="12" type="number"></td>
	</tr>
	<tr>
		<td>Причина:</td>
		<td><multiedit var="reason" width=130 height=32></td>
	</tr>
	<tr>
		<td>Аккаунт:</td>
		<td><edit var="acc" width="130" height="12"></td>
		<td><a action="bypass -h admin_punishment_add $acc ACCOUNT $punishmentType $expiration $reason">Бан</a></td>
	</tr>
	<tr>
		<td>Персонаж:</td>
		<td><edit var="char" width="130" height="12"></td>
		<td><a action="bypass -h admin_punishment_add $char CHARACTER $punishmentType $expiration $reason">Бан</a></td>
	</tr>
	<tr>
		<td>IP:</td>
		<td><edit var="ip" width="130" height="12"></td>
		<td><a action="bypass -h admin_punishment_add $ip IP $punishmentType $expiration $reason">Бан</a></td>
	</tr>
	<tr>
		<td>HWID:</td>
		<td><edit var="hwid" width="130" height="12"></td>
		<td><a action="bypass -h admin_punishment_add $hwid HWID $punishmentType $expiration $reason">Бан</a></td>
	</tr>
</table>
</center>
<br>
<font color="LEVEL">Для перманентного бана укажите время 0.<br1>
Время указывается в минутах.</font>
</html>
