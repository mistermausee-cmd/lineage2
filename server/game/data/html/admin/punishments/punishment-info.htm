<html><title>Панель информации о наказаниях</title><body>
<center>
<table width=270>
<tr>
<td width=45><button value="Главная" action="bypass admin_admin" width=45 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
<td width=180><center>%affect_type%: <font color="LEVEL">%player_name%</font></center></td>
<td width=45><button value="Назад" action="bypass admin_punishment" width=45 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
</tr>
</table>
<br>
<table width=280 bgcolor="666666" cellspacing="0" cellpadding="6">
	<tr>
		<td>Тип цели:</td>
		<td><combobox width=120 height=12 var="affectType" list="%affects%"></td>
	</tr>
	<tr>
		<td>Ключ:</td>
		<td><edit var="key" width="130" height="12"></td>
	</tr>
	<tr>
		<td></td>
		<td><a action="bypass admin_punishment info $key $affectType">Проверить</a></td>
	</tr>
</table>
<br>
<table width=280 bgcolor="666666" cellspacing="0" cellpadding="6">
	<tr>
		<td>Тип</td>
		<td>Истекает</td>
		<td>Действие</td>
	</tr>
	%punishments%
</table>
