<html><body>
<table width=260><tr>
<td width=40><button value="Главная" action="bypass admin_admin" width=40 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
<td width=180><center>Меню выбора персонажа</center></td>
<td width=40><button value="Назад" action="bypass admin_character_info %name%" width=40 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
</tr></table>
<br><br>
<center>Изменение <font color="LEVEL">%name%</font></center>
<table width=270>
<tr><td>Уровень: %level%</td></tr>
<tr><td>Класс: %class%</td></tr>
<tr><td>Опыт: %xp%</td></tr>
<tr><td>SP: %sp%</td></tr></table>
<center><br>
Заметка: заполните ОБА значения перед сохранением изменений<br1>
и укажите 0, если изменения не нужны.<br>
<table width=270><tr>
<td width=30>Опыт:</td><td><edit var="exp_to_add" width=50></td>
<td width=30>SP:</td><td><edit var="sp_to_add" width=50></td>
<td><button value="Добавить" action="bypass -h admin_add_exp_sp $exp_to_add $sp_to_add" width=50 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
<td><button value="Убрать" action="bypass -h admin_remove_exp_sp $exp_to_add $sp_to_add" width=60 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
</tr></table>
Задайте новый уровень персонажа в поле ниже:<br>
<table width=270><tr>
<td width=60>Уровень</td><td><edit var="lv" width=50></td>
<td><button value="Задать ур." action="bypass -h admin_set_level $lv" width=80 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
</tr></table>
</center></body></html>
