<html><title>Выключение сервера</title><body>
<table width=270><tr>
<td width=45><button value="Глав." action="bypass admin_admin" width=45 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
<td width=180><center>Управление сервером</center></td>
<td width=45><button value="Назад" action="bypass admin_admin4" width=45 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
</tr></table><br>
<table width=270><tr>
<td width=100>Время выключения:</td>
<td><edit var="qbox" width=120 height=15></td>
<td><button value="Помощь" action="bypass admin_html help/shutdown.htm" width=45 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
</tr></table><br><br>
<table width=270>	
<tr><td>Игроков онлайн:</td><td>%count%</td></tr>
<tr><td>Занято памяти:</td><td>%used% байт</td></tr>
<tr><td>Игровое время:</td><td>%time%</td></tr>
</table><br><br>
<center><table><tr><td>
<button value="Выключение" action="bypass -h admin_server_shutdown $qbox" width=80 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td><td>			
<button value="Рестарт" action="bypass -h admin_server_restart $qbox" width=80 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td><td>			
<button value="Отмена" action="bypass -h admin_server_abort" width=80 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td></tr>
</table></center>
</body></html>
