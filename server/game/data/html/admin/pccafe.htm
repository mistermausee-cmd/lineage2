<html><title>Менеджер PC-очков</title><body>
<center>
<table width=270 align=center>
<tr>
<td width=45><button value="Глав." action="bypass admin_admin" width=45 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
<td width=180><center>Менеджер PC-очков</center></td>
<td width=45><button value="Назад" action="bypass admin_admin6" width=45 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
</tr>
</table>
<br>
<font color="LEVEL">Инфо цели</font><br1>
	<table width="270" align=center border="0" bgcolor="444444">
		<tr>
			<td>Имя игрока:</td>
			<td><font color="00FF00">%targetName%</font></td>
		</tr>
		<tr>
			<td>Очки игрока:</td>
			<td><font color="00FF00">%points%</font></td>
		</tr>
	</table>
	<br>
	<font color="LEVEL">Операции с целью</font><br1>
	<table width=256 align=center border=0 bgcolor="444444">
		<tr>
			<td width=128 align=center>Операция</td>
			<td width=128 align=center><combobox width=120 height=17 var=ebox list=increase;decrease;set></td>
		</tr>
		<tr>
			<td width=128 align=center>Значение</td>
			<td width=128 align=center><edit var="val" width=120 type="number"></td>
		</tr>
	</table>
	<table width="270" align=center border="0" bgcolor="444444">
		<tr>
			<td><center><br><button value="Подтвердить" action="bypass -h admin_pccafepoints $ebox $val" width=80 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></center></td>
		</tr>
	</table>
	<br>
	<font color="LEVEL">Наградить игроков</font><br1>
	<table width=256 align=center border=0 bgcolor="444444">
		<tr>
			<td width=128 align=center>Радиус</td>
			<td width=128 align=center><edit var="range" width=120 type="number"></td>
		</tr>
		<tr>
			<td width=128 align=center>Значение</td>
			<td width=128 align=center><edit var="val2" width=120 type="number"></td>
		</tr>
	</table>
	<table width="257" align=center border="0" bgcolor="444444">
		<tr>
			<td><center><br><button value="Подтвердить" action="bypass -h admin_pccafepoints rewardOnline $val2 $range" width=80 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></center></td>
		</tr>
		<tr>
			<td><center>Примечание: если оставить 'Радиус' пустым или 0,<br1>награду получат все игроки онлайн.</center></td>
		</tr>
	</table>
</center>
</body></html>
