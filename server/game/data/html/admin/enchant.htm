<html><title>Меню заточки и атрибутов</title><body>
<center>
<table width=270>
<tr>
<td width=45><button value="Главная" action="bypass admin_admin" width=45 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
<td width=180><center>Заточка и атрибуты</center></td>

</tr>
</table>
<br>

<tr>

</tr>
</table>
<br>
<table width=260>
<tr>
<td><button value="+6" action="bypass -h admin_seteh 6" width=35 height=20 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>

<font color="LEVEL">Атрибуты:</font><br>

<br>
<table width=260>
