<html><title>Панель поиска Dualbox</title><body>
<center>
<table width=270>
<tr>
<td width=45><button value="Главная" action="bypass admin_admin" width=45 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
<td width=180><center>Меню Dualbox</center></td>
<td width=45><button value="Назад" action="bypass admin_admin6" width=45 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
</tr>
</table>
<br>
<button value="К списку персонажей" action="bypass admin_show_characters 0" width=150 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF">
<br>
IP с Dualbox (%multibox%):
<br>
%results%
<br><br>
Найти Dualbox с:<br1>
<table width=220>
<tr>
<td><button value="2+ персонажей" action="bypass -h admin_%strict%find_dualbox 2" width=110 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
<td><button value="3+ персонажей" action="bypass -h admin_%strict%find_dualbox 3" width=110 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
</tr>
<tr>
<td><button value="4+ персонажей" action="bypass -h admin_%strict%find_dualbox 4" width=110 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
<td><button value="5+ персонажей" action="bypass -h admin_%strict%find_dualbox 5" width=110 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
</tr>
</table>
<br>
</center>
</body></html>
