<html><title>Управление замками</title><body>
<center>
<table width=270>
<tr>
<td width=45><button value="Главная" action="bypass admin_admin" width=45 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
<td width=180><center>Управление замками</center></td>
<td width=45><button value="Назад" action="bypass admin_castlemanage" width=45 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
</tr>
</table>
<br>
<font color=""><button action="" value="Замок %castleName%: инфо" width=270 height=21 back="L2UI_CT1.OlympiadWnd_DF_Watch_Down" fore="L2UI_CT1.OlympiadWnd_DF_Watch"></font>
	<table width="270" border="0" bgcolor="444444">
		<tr>
			<td>Владелец:</td>
			<td><font color="LEVEL">%ownerName%</font></td>
		</tr>
		<tr>
			<td>Клан:</td>
			<td><font color="LEVEL">%ownerClan%</font></td>
		</tr>
		<tr>
			<td>Сторона замка:</td>
			<td><font color="LEVEL">%castleSide%</font></td>
		</tr>
		<tr>
			<td>Инфо осады:</td>
			<td><button  value="Показать" action="bypass admin_castlemanage %castleId% showRegWindow" width=85 height=18 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
		</tr>
	</table>
	<br><br>
	<button action="" value="Управление замком" width=270 height=21 back="L2UI_CT1.OlympiadWnd_DF_Watch_Down" fore="L2UI_CT1.OlympiadWnd_DF_Watch">
	<table width=256 border=0 bgcolor="444444">
		<tr>
			<td align=center><button value="Выдать замок" action="bypass admin_castlemanage %castleId% setOwner $ebox" width=128 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
			<td align=center><combobox width=120 height=17 var=ebox list=Light;Dark></td>
		</tr>
		<tr>
			<td align=center><button value="Забрать замок" action="bypass admin_castlemanage %castleId% takeCastle" width=130 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
			<td align=center><button value="Сменить сторону" action="bypass admin_castlemanage %castleId% switchSide" width=130 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
		</tr>
	</table>
		<br><br>
		<button action="" value="Управление осадой" width=270 height=21 back="L2UI_CT1.OlympiadWnd_DF_Watch_Down" fore="L2UI_CT1.OlympiadWnd_DF_Watch">
	<table width=256 border=0 bgcolor="444444">
		<tr>
			<td align=center><button value="Доб. атакующего" action="bypass admin_castlemanage %castleId% addAttacker" width=128 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
			<td align=center><button value="Убрать атакующего" action="bypass admin_castlemanage %castleId% removeAttacker" width=128 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
		</tr>
		<tr>
			<td align=center><button value="Доб. защитника" action="bypass admin_castlemanage %castleId% addDeffender" width=128 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
			<td align=center><button value="Убрать защитника" action="bypass admin_castlemanage %castleId% removeDeffender" width=128 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
		</tr>
		<tr>
			<td align=center><button value="Начать осаду" action="bypass admin_castlemanage %castleId% startSiege" width=128 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
			<td align=center><button value="Остановить осаду" action="bypass admin_castlemanage %castleId% stopSiege" width=128 height=21 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
		</tr>
	</table>
</center>
</body></html>
