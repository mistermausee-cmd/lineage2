<html><body>Хранитель Портала Триша:<br>
Прогуляться и полюбоваться видами всегда полезно, но иногда просто нет времени, понимаешь? Я могу помочь тебе, если ты хочешь куда-нибудь отправиться через врата времени и пространства.<br>
(Если твой <font color="LEVEL">основной класс</font> <font color="LEVEL">Ур. 76 или ниже</font>, ты можешь телепортироваться бесплатно.)<br>
<Button ALIGN=LEFT ICON="TELEPORT" action="bypass npc_%objectId%_showTeleports">Телепортироваться</Button>
<Button ALIGN=LEFT ICON="NORMAL" action="bypass -h npc_%objectId%_multisell 002">Использовать Кристалл Измерений</Button>
<Button ALIGN=LEFT ICON="NORMAL" action="bypass npc_%objectId%_showNoblesSelect">[Только для Дворян] Телепортироваться</Button>
<Button ALIGN=LEFT ICON="NORMAL" action="bypass -h Script TeleportToRaceTrack TELEPORT" msg="811;Monster Race Track">Хочу бесплатно попасть на Арену и Ипподром</Button>
<Button ALIGN=LEFT ICON="NORMAL" action="bypass -h Script TeleportToFantasy TELEPORT" msg="811;Fantasy Isle">Переместиться на Остров Фантазий (бесплатно)</Button>
<Button ALIGN=LEFT ICON="NORMAL" action="bypass -h Script CharacterBirthday">Мне нужно позвать Алегрию</Button>
<Button ALIGN=LEFT ICON="QUEST" action="bypass Script">Квест</Button>
</body></html>
