<font color="LEVEL">Адена и предметы</font><br>
Часто после убийства монстра он роняет предметы или адену, которыми владел. Наведите курсор на предмет или адену, и он превратится в значок в виде руки, позволяя поднять их. Просто щёлкните, чтобы поднять. Собранные предметы можно просмотреть в Окне инвентаря (Tab или Alt+V).<br>
