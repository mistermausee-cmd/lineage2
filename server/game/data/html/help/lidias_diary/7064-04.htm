<html><body>Дневник Лидии:<br>
Двадцать второй день месяца Шилен.<br><br>
Я подслушала разговор отца, пока подавала чай гостю.<br>
Он всё говорил и говорил о том, чтобы начать восстание!
О чём он только думает?<br>
Мы слишком многое потеряли в прошлой войне, даже единственного брата бедной Роуз!<br>
