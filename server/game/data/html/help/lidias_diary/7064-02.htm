<html><body>Дневник Лидии:<br>
Десятый день месяца Шилен.<br><br>
Отец в последнее время очень занят.
Они с братом до глубокой ночи разговаривают!
Сегодня днём приходили гости.
Обычно он предложил бы им угощение и лёгкую беседу, но сегодня сразу же проводил их прямо в свой кабинет!
Что на него нашло?<br>
