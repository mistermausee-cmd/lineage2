<html><body>Страж Чиперан:<br>
Держись горы по левую руку и иди, пока не выйдешь к небольшой реке. Если пойдёшь вверх по течению, доберёшься до водопадов — истока этой реки.<br>
Там часто появляются орки, так что это немного опасно, но величественное зрелище водопада стоит такого риска.
</body></html>
