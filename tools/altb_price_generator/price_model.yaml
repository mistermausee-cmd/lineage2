# Price_Model — variant "Сбалансированная" (Balanced), variant_multiplier = 1.0
# Calibration derived from real server data (see design.md). All Farm_Rate and
# Grade_Floor values are positive integers; Grade_Floor is non-decreasing.
# Requirements: 1.1, 1.2, 1.3, 2.1-2.4, 7.6, 8.1, 8.5.

# Adena income per hour by Progression_Stage (adena x3 rates). Strictly increasing.
farm_rate:
  B: 100000
  A: 150000
  S: 250000
  S80: 400000
  R: 2500000
  R95: 8000000
  R99: 35000000
  epic: 40000000

# Minimum base price (adena) per grade; non-decreasing along D<C<B<A<S<S80<R<R95<R99.
# Grade_Floor = Farm_Rate x 1.0h of the stage.
grade_floor:
  D: 30000
  C: 70000
  B: 100000
  A: 150000
  S: 250000
  S80: 400000
  R: 2500000
  R95: 8000000
  R99: 35000000

# Multiplier by role of the item inside a department. Acts as the effective
# "Target_Farm_Hours" multiplier applied on top of Grade_Floor (= Farm_Rate x 1h),
# so consumable << key items < accessories < weapons << prestige.
role_weight:
  consumable: 0.05     # charges/arrows/potions/boosters (0.02-0.1h)
  craft: 0.4           # craft materials/crystals/gemstones
  cosmetic: 0.4        # appearance stones / prototypes
  armor: 1.0           # one armor slot (key item)
  jewelry: 1.2         # ordinary jewelry (ranked further by Effective_Stat_Value)
  spec: 1.5            # pets and pet gear
  enchant: 2.0         # enchant scrolls/stones base (kind factor differentiates)
  accessory: 1.75      # cloak/belt/talisman/headgear stat items
  weapon: 3.0          # a single major purchase
  prestige: 12.0       # epics / final upgrade-chain links (Target_Farm_Hours >= 15)

# Fine-tuning multipliers inside a department (Category_Factor).
category_factor:
  default: 1.0
  enchant_common: 1.0      # ordinary scroll/stone
  enchant_blessed: 3.0     # blessed scroll/stone
  enchant_sacred: 5.0      # sacred scroll / ancient crystal
  enchant_weapon: 1.3      # weapon enchant >= armor enchant of same type/grade
  upgrade_chain_step: 1.4  # each chain link = previous x 1.4

# Target_Farm_Hours per role bucket (Balanced variant). Documentation of the
# hours calibration; the effective hours are folded into role_weight above so
# the reproducible formula stays Grade_Floor x Role_Weight x Category_Factor.
# Ranges (Requirement 2.2/2.3/2.4):
#   consumable  0.01-0.99h ; key item 1-10h ; prestige 15-100h.
target_farm_hours:
  consumable: 0.05
  craft: 0.4
  cosmetic: 0.4
  armor: 1.0
  jewelry: 1.2
  spec: 1.5
  enchant: 2.0
  accessory: 1.75
  key_item: 3.0
  weapon: 3.0
  prestige: 20.0

# Anti-exploit and basis parameters (owner's final decisions).
anti_exploit_mult: 2.0
sell_price_basis: half     # NPC_Sell_Price = price/2 -> floor = price
variant: balanced
variant_multiplier: 1.0
enchant_target_level: 6

# Manual overrides live in manual_overrides.yaml (merged at load time).
manual_override: {}
